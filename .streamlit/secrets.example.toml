# 이 파일을 복사해 .streamlit/secrets.toml로 저장하고 실제 값을 채워 넣으세요.
# .streamlit/secrets.toml은 .gitignore에 포함되어 깃에 올라가지 않습니다.
#
# [네이버 메일 사용 시 준비 사항]
# 1. 네이버 메일 접속 > 환경설정 > POP3/IMAP 설정 > "POP3/SMTP 사용"을 사용함으로 저장
# 2. 2단계 인증을 사용 중이라면, 네이버 계정(스마트로그인) 설정에서
#    "애플리케이션 비밀번호"를 발급받아 smtp_password에 사용하세요.
#    2단계 인증을 사용하지 않는다면 네이버 로그인 비밀번호를 그대로 사용할 수 있습니다.

[email]
smtp_host = "smtp.naver.com"
smtp_port = 587
smtp_user = "cchasuhyun@naver.com"
smtp_password = "REPLACE_WITH_NAVER_PASSWORD_OR_APP_PASSWORD"

# [Supabase 사용 시 준비 사항]
# 1. https://supabase.com 에서 무료 프로젝트 생성 (리전은 가급적 ap-northeast-2 Seoul 선택)
# 2. schema.sql 파일 내용을 프로젝트의 SQL Editor에서 실행해 테이블 생성
# 3. 프로젝트 설정(Settings > API)에서 Project URL과 anon public key를 복사해 아래에 채워 넣기
#    (이 값들은 Streamlit 서버에서만 사용되며 브라우저로 노출되지 않습니다)
[supabase]
url = "https://REPLACE_WITH_PROJECT_ID.supabase.co"
key = "REPLACE_WITH_ANON_PUBLIC_KEY"
